<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SenseFin — Panel inteligente de finanzas personales. Dashboard premium con gestión de gastos, insights y recibos.">
    <title>SenseFin — Finance Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        .material-symbols-outlined.fill-1 {
            font-variation-settings: 'FILL' 1;
        }
    </style>
</head>
<body>
    <div class="app-layout">

        <!-- LEFT SIDEBAR -->
        <aside class="sidebar-left">
            <a class="sidebar-logo" href="#">
                <div class="sidebar-logo-icon">
                    <span class="material-symbols-outlined">account_balance_wallet</span>
                </div>
                <div class="sidebar-logo-text">
                    <span class="sidebar-logo-name">SenseFin</span>
                    <span class="sidebar-logo-subtitle">Intelligence</span>
                </div>
            </a>

            <nav class="sidebar-nav">
                <button class="nav-item active" data-view="dashboard">
                    <span class="material-symbols-outlined fill-1">dashboard</span>
                    <span>Dashboard</span>
                </button>
                <button class="nav-item" data-view="historial">
                    <span class="material-symbols-outlined">history</span>
                    <span>History</span>
                </button>
                <button class="nav-item" data-view="recibos">
                    <span class="material-symbols-outlined">receipt_long</span>
                    <span>Receipts</span>
                </button>
                <button class="nav-item" data-view="insights">
                    <span class="material-symbols-outlined">trending_up</span>
                    <span>Insights</span>
                </button>
            </nav>

            <div class="sidebar-bottom">
                <div class="mini-calendar" id="mini-calendar"></div>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="main-content" id="main-content"></main>

        <!-- RIGHT SIDEBAR + TOGGLE -->
        <div class="sidebar-toggle-wrap">
            <aside class="sidebar-right" id="right-sidebar">
                <div class="sidebar-right-inner" id="sidebar-right-content"></div>
            </aside>
            <button class="sidebar-toggle-btn" id="sidebar-toggle" title="Toggle sidebar">
                <span class="material-symbols-outlined">chevron_right</span>
            </button>
        </div>
    </div>

    <!-- MODAL -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal" id="modal-container"></div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
